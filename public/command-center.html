<title>HELO Command Center - Nic</title>
<style>
  :root {
    --bg: #0b0f1a;
    --panel: #141a2b;
    --panel-2: #101729;
    --line: #263149;
    --line-soft: rgba(255,255,255,.08);
    --text: #e6edf7;
    --muted: #8d98af;
    --accent: #4ea1ff;
    --green: #5eead4;
    --yellow: #ffc857;
    --red: #ff5c75;
    --blue: #7cb7ff;
    --shadow: 0 18px 45px rgba(0,0,0,.22);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 14px;
    line-height: 1.45;
  }

  a { color: inherit; }

  .shell {
    max-width: 1700px;
    margin: 0 auto;
    padding: 28px 22px 34px;
  }

  header {
    display: grid;
    grid-template-columns: minmax(260px, 1fr) auto;
    gap: 16px;
    align-items: end;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }

  h1 {
    margin: 0;
    font-size: 30px;
    line-height: 1.05;
    letter-spacing: 0;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  .top-actions,
  .links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: flex-end;
  }

  button,
  .button {
    min-height: 36px;
    border: 1px solid rgba(78,161,255,.45);
    background: rgba(78,161,255,.16);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 11px;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }

  button.secondary,
  .button.secondary {
    border-color: var(--line);
    background: rgba(255,255,255,.04);
    color: #c9d4e8;
  }

  .toolbar {
    display: grid;
    grid-template-columns: minmax(220px, 1fr) 160px 180px;
    gap: 10px;
    padding: 18px 0;
  }

  input,
  select,
  textarea {
    border: 1px solid var(--line);
    border-radius: 6px;
    background: #0d1322;
    color: var(--text);
    min-height: 40px;
    padding: 9px 11px;
    font: inherit;
  }

  input::placeholder { color: #68748d; }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }

  .metric,
  .card,
  .empty {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: var(--shadow);
  }

  .metric {
    padding: 13px 14px;
    min-height: 78px;
  }

  .metric strong {
    display: block;
    font-size: 28px;
    line-height: 1;
  }

  .metric span {
    display: block;
    margin-top: 8px;
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(5, minmax(230px, 1fr));
    gap: 12px;
    align-items: start;
  }

  .lane { min-width: 0; }

  .lane-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
    min-height: 30px;
  }

  .lane-title {
    color: #dce6f7;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .lane-count {
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 8px;
    color: var(--muted);
    background: rgba(255,255,255,.04);
    font-size: 12px;
    font-weight: 800;
  }

  .stack {
    display: grid;
    gap: 10px;
  }

  .card {
    border-left: 5px solid var(--blue);
    padding: 14px;
    display: grid;
    gap: 10px;
    min-height: 258px;
    align-content: start;
  }

  .card[data-lane="idea"] { border-left-color: var(--yellow); }
  .card[data-lane="build"] { border-left-color: var(--blue); }
  .card[data-lane="qc"] { border-left-color: var(--red); }
  .card[data-lane="deploy"] { border-left-color: var(--green); }
  .card[data-lane="done"] { border-left-color: #6f7b91; }

  .card h2 {
    margin: 0;
    font-size: 17px;
    line-height: 1.18;
    letter-spacing: 0;
  }

  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: rgba(255,255,255,.04);
    color: #c3cee3;
    min-height: 24px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 800;
  }

  .pill.good { color: var(--green); border-color: rgba(94,234,212,.35); background: rgba(94,234,212,.08); }
  .pill.warn { color: var(--yellow); border-color: rgba(255,200,87,.35); background: rgba(255,200,87,.08); }

  .summary,
  .small {
    margin: 0;
    color: #bdc8dc;
    font-size: 12px;
    line-height: 1.4;
  }

  .status-strip {
    margin: 0;
    border: 1px solid var(--line-soft);
    border-radius: 6px;
    background: var(--panel-2);
    color: #c7d3e7;
    padding: 8px 9px;
    font-size: 12px;
    line-height: 1.35;
  }

  .status-strip strong {
    display: block;
    color: var(--muted);
    font-size: 10px;
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .status-strip.last {
    background: rgba(78,161,255,.07);
    border-color: rgba(78,161,255,.22);
  }

  .links {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    justify-content: stretch;
  }

  .links a,
  .links button {
    width: 100%;
    min-height: 34px;
    padding: 7px 8px;
    font-size: 12px;
  }

  .links .primary {
    background: rgba(94,234,212,.14);
    border-color: rgba(94,234,212,.5);
    color: var(--green);
  }

  details {
    border-top: 1px solid var(--line-soft);
    padding-top: 8px;
  }

  summary {
    cursor: pointer;
    color: var(--muted);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  ul {
    margin: 8px 0 0;
    padding-left: 17px;
    color: #aeb9ce;
    font-size: 12px;
    line-height: 1.35;
  }

  .empty {
    min-height: 110px;
    display: grid;
    place-items: center;
    color: var(--muted);
    border-style: dashed;
    background: rgba(255,255,255,.025);
  }

  .modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0,0,0,.68);
    z-index: 5;
  }

  .modal.open { display: flex; }

  .modal-box {
    width: min(880px, 100%);
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--panel);
    box-shadow: 0 24px 80px rgba(0,0,0,.45);
    padding: 18px;
  }

  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }

  .modal h2 {
    margin: 0;
    font-size: 20px;
  }

  textarea {
    width: 100%;
    min-height: 210px;
    resize: vertical;
    font-family: Consolas, "Courier New", monospace;
    font-size: 13px;
    line-height: 1.45;
  }

  footer {
    margin-top: 28px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }

  @media (max-width: 1180px) {
    .board { grid-template-columns: repeat(2, minmax(240px, 1fr)); }
    .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }

  @media (max-width: 720px) {
    .shell { padding: 18px 14px 28px; }
    header,
    .toolbar,
    .board,
    .metrics {
      grid-template-columns: 1fr;
    }
    .top-actions { justify-content: flex-start; }
    h1 { font-size: 27px; }
  }
</style>
</head>

        foremanPrompt: "Project: Security Audit. Use C:\\FUCKYOUCHATGPT\\security-audit and inspect C:\\FUCKYOUCHATGPT\\stock-bridge-push-work. Focus on public exposure in Netlify public files and unauthenticated functions. First read JAZZY_NETLIFY_PUBLIC_RISK.md."
      },
      {
        id: "llc-partner-draws",
        name: "LLC Partner Draws",
        aliases: ["llc", "partner draws", "arlenys draws", "tax summary", "cash split"],
        lane: "idea",
        status: "intake",
        confidence: "verified",
        summary: "Document intake and analysis workspace for LLC cash, P&L, tax-return context, and unequal partner draws.",
        localPath: "C:\\FUCKYOUCHATGPT\\llc-partner-draws",
        repo: "",
        live: "",
        editUrl: "",
        sourceFiles: ["README.md", "DOCUMENTS_TO_ADD.md", "partner-draws-notes.md", "FILED_TAX_SUMMARY_FROM_SCREENSHOT.md", "PARTNER_DRAW_TALLY.md", "BANK_LEDGER_INDEX.md"],
        services: ["Local document analysis", "CPA review after calculations"],
        envVars: [],
        nextAction: "Add current bank screenshot, prior returns, P&L files, and draw notes.",
        lastAction: "2026-05-14: Imported Chase statements, built searchable ledgers, added filed-tax screenshot summary, and created draw tally.",
        foremanPrompt: "Project: LLC Partner Draws. Use C:\\FUCKYOUCHATGPT\\llc-partner-draws. Review README.md, DOCUMENTS_TO_ADD.md, and uploaded bank/tax/P&L files. Build a concise cash and partner-draw summary for Nic and Arlenys. Do not present tax/legal advice as final."
      },
      {
        id: "whop",
        name: "WHOP",
        aliases: ["whop", "whop puller", "whop api", "whop payments", "whop revenue"],
        lane: "idea",
        status: "shell",
        confidence: "verified",
        summary: "Future automation project for pulling Whop payment and revenue data by date range.",
        localPath: "C:\\FUCKYOUCHATGPT\\WHOP",
        repo: "",
        live: "",
        editUrl: "",
        sourceFiles: ["README.md", "NOTES.md"],
        services: ["Whop API", "Local reporting", "Future CSV/JSON exports"],
        envVars: ["WHOP_API_KEY", "WHOP_COMPANY_ID"],
        nextAction: "Paused. Build later when Nic wants the Whop API puller.",
        lastAction: "2026-05-14: Created shell project and added Whop screenshot stats to LLC notes.",
        foremanPrompt: "Project: WHOP. Use C:\\FUCKYOUCHATGPT\\WHOP. Do not build until Nic asks. When building, verify current Whop API docs first, use read-only API access, keep secrets in environment variables only, and produce date-range revenue summaries."
      }
    ]
  };

  const lanes = [
    ["idea", "Idea"],
    ["build", "Build"],
    ["qc", "QC"],
    ["deploy", "Deploy"],
    ["done", "Done"]
  ];

  const state = { search: "", lane: "all", confidence: "all" };
  const byId = (id) => document.getElementById(id);

  function init() {
    byId("subtitle").textContent = `${data.subtitle} | Updated ${data.updatedAt}`;
    byId("search").addEventListener("input", (event) => {
      state.search = event.target.value.trim().toLowerCase();
      render();
    });
    byId("laneFilter").addEventListener("change", (event) => {
      state.lane = event.target.value;
      render();
    });
    byId("confidenceFilter").addEventListener("change", (event) => {
      state.confidence = event.target.value;
      render();
    });
    byId("closeModal").addEventListener("click", closeModal);
    byId("copyPrompt").addEventListener("click", copyPrompt);
    byId("promptModal").addEventListener("click", (event) => {
      if (event.target.id === "promptModal") closeModal();
    });
    byId("showAllPrompt").addEventListener("click", () => {
      showPrompt("Foreman Intake Prompt", [
        "Act as Codex Foreman for Nic.",
        "Use HELO Command Center as the project registry.",
        "When Nic refers to a project by nickname, match it against aliases first.",
        "Before changing files, verify the local path, repo, live URL, and source-of-truth file.",
        "End with exact files changed, verification result, and live URL if deployed."
      ].join("\\n"));
    });
    render();
  }

  function filteredProjects() {
    return data.projects.filter((project) => {
      if (state.lane !== "all" && project.lane !== state.lane) return false;
      if (state.confidence !== "all" && project.confidence !== state.confidence) return false;
      if (!state.search) return true;
      const haystack = [
        project.name,
        project.summary,
        project.localPath,
        project.repo,
        project.live,
        project.liveLabel,
        project.status,
        project.confidence,
        project.lastAction,
        ...(project.aliases || []),
        ...(project.services || []),
        ...(project.sourceFiles || []),
        ...((project.extraLinks || []).map((link) => `${link.label} ${link.url}`))
      ].join(" ").toLowerCase();
      return haystack.includes(state.search);
    });
  }

  function renderMetrics(projects) {
    const verified = projects.filter((project) => project.confidence === "verified").length;
    const active = projects.filter((project) => ["active", "prototype", "local prototype"].includes(project.status)).length;
    const needsReview = projects.filter((project) => project.confidence !== "verified").length;
    const repos = projects.filter((project) => project.repo).length;
    byId("metrics").innerHTML = [
      metric(projects.length, "Visible Projects"),
      metric(active, "Active / Prototype"),
      metric(verified, "Verified"),
      metric(needsReview, "Needs Review"),
      metric(repos, "GitHub Linked")
    ].join("");
  }

  function metric(value, label) {
    return `<div class="metric"><strong>${value}</strong><span>${label}</span></div>`;
  }

  function render() {
    const projects = filteredProjects();
    renderMetrics(projects);
    byId("board").innerHTML = lanes.map(([laneId, laneTitle]) => {
      const laneProjects = projects.filter((project) => project.lane === laneId);
      return `
        <section class="lane">
          <div class="lane-head">
            <div class="lane-title">${laneTitle}</div>
            <div class="lane-count">${laneProjects.length}</div>
          </div>
          <div class="stack">${laneProjects.map(card).join("") || `<div class="empty">No projects</div>`}</div>
        </section>
      `;
    }).join("");

    document.querySelectorAll("[data-prompt-id]").forEach((button) => {
      button.addEventListener("click", () => {
        const project = data.projects.find((item) => item.id === button.dataset.promptId);
        showPrompt(project.name, project.foremanPrompt);
      });
    });
    document.querySelectorAll("[data-open-path]").forEach((button) => {
      button.addEventListener("click", () => showPrompt("Local Path", button.dataset.openPath));
    });
  }

  function card(project) {
    const confidenceClass = project.confidence === "verified" ? "good" : "warn";
    const aliases = (project.aliases || []).slice(0, 4).map((alias) => `<span class="pill">${escapeHtml(alias)}</span>`).join("");
    const services = (project.services || []).map((service) => `<li>${escapeHtml(service)}</li>`).join("");
    const files = (project.sourceFiles || []).map((file) => `<li>${escapeHtml(file)}</li>`).join("");
    const env = (project.envVars || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("");
    const extraLinks = (project.extraLinks || []).map((link) => `<a class="button secondary" href="${escapeAttr(link.url)}" target="_blank" rel="noreferrer">${escapeHtml(link.label)}</a>`).join("");
    return `
      <article class="card" data-lane="${escapeAttr(project.lane)}">
        <div>
          <h2>${escapeHtml(project.name)}</h2>
          <div class="meta" style="margin-top:8px;">
            <span class="pill ${confidenceClass}">${escapeHtml(project.confidence)}</span>
            <span class="pill">${escapeHtml(project.status)}</span>
          </div>
        </div>
        <p class="summary">${escapeHtml(project.summary)}</p>
        <div class="meta">${aliases}</div>
        ${project.lastAction ? `<p class="status-strip last"><strong>Last</strong>${escapeHtml(project.lastAction)}</p>` : ""}
        <p class="status-strip"><strong>Next</strong>${escapeHtml(project.nextAction)}</p>
        <div class="links">
          ${project.localPath ? `<button class="secondary" type="button" data-open-path="${escapeAttr(project.localPath)}">Folder</button>` : `<span></span>`}
          ${project.repo ? `<a class="button secondary" href="${escapeAttr(project.repo)}" target="_blank" rel="noreferrer">GitHub</a>` : `<span></span>`}
          ${project.live ? `<a class="button primary" href="${escapeAttr(project.live)}" target="_blank" rel="noreferrer">${escapeHtml(project.liveLabel || "Live")}</a>` : `<span></span>`}
          ${project.editUrl ? `<a class="button secondary" href="${escapeAttr(project.editUrl)}" target="_blank" rel="noreferrer">${escapeHtml(project.editLabel || "Edit")}</a>` : `<span></span>`}
          ${extraLinks}
          <button type="button" data-prompt-id="${escapeAttr(project.id)}">Codex Prompt</button>
        </div>
        <details>
          <summary>Map</summary>
          <p class="small" style="margin-top:8px;">${escapeHtml(project.localPath || "No local path confirmed")}</p>
          ${files ? `<ul>${files}</ul>` : ""}
        </details>
        <details>
          <summary>Services</summary>
          ${services ? `<ul>${services}</ul>` : `<p class="small" style="margin-top:8px;">No services mapped.</p>`}
        </details>
        <details>
          <summary>Env Names</summary>
          ${env ? `<ul>${env}</ul>` : `<p class="small" style="margin-top:8px;">No env vars mapped.</p>`}
        </details>
      </article>
    `;
  }

  function showPrompt(title, prompt) {
    byId("modalTitle").textContent = title;
    byId("promptText").value = prompt || "";
    byId("promptModal").classList.add("open");
    byId("promptText").focus();
    byId("promptText").select();
  }

  function closeModal() {
    byId("promptModal").classList.remove("open");
  }

  async function copyPrompt() {
    const text = byId("promptText").value;
    try {
      await navigator.clipboard.writeText(text);
      byId("copyPrompt").textContent = "Copied";
    } catch (error) {
      byId("promptText").focus();
      byId("promptText").select();
      byId("copyPrompt").textContent = "Select + Copy";
    }
    setTimeout(() => byId("copyPrompt").textContent = "Copy Prompt", 1400);
  }

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeAttr(value) {
    return escapeHtml(value).replaceAll("`", "&#096;");
  }

  init();
</script>
</body>
</html>
