name: Refresh Earnings Calendar

on:
  schedule:
    # Mon-Fri at 3:15 AM PT (10:15 UTC)
    - cron: '15 10 * * 1-5'
    # Sunday at 8:00 PM PT (Monday 3:00 UTC)
    - cron: '0 3 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run earnings build script
        run: python3 scripts/build_earnings.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/data/earnings.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "stock-bridge-bot"
          git config user.email "bot@simplestocks.com"
          git add public/data/earnings.json
          git commit -m "chore: refresh earnings calendar $(date +%Y-%m-%d)"
          git push
